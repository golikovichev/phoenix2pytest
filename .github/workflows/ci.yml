name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff==0.15.13"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests (skip integration)
        run: pytest tests -m "not integration" --cov=src/phoenix2pytest --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration tests (Phoenix MCP)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run integration tests
        env:
          PHOENIX_HOST: ${{ secrets.PHOENIX_HOST }}
          PHOENIX_API_KEY: ${{ secrets.PHOENIX_API_KEY }}
        run: |
          if [ -z "$PHOENIX_API_KEY" ]; then
            echo "PHOENIX_API_KEY not set, skipping integration tests"
            exit 0
          fi
          pytest tests -m "integration"
